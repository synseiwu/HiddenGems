<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Points Store | Hidden Gems</title>
  <link rel="icon" href="./assets/hidden-gems-logo.png"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./config.js"></script>
  <script defer src="./assets/site.js"></script>
</head>
<body class="min-h-screen bg-black text-white" style="background:radial-gradient(circle at top right, rgba(236,72,153,0.22), transparent 30%),radial-gradient(circle at left, rgba(217,70,239,0.14), transparent 24%),#000;">
<script>
  document.addEventListener('DOMContentLoaded',()=>{
    const cfg = window.GEMS_HIDDEN_CONFIG || {};
    const brand = cfg.brandName || 'Hidden Gems';

    const paypalLink = cfg.paypalLinks?.points || cfg.paypalLinks?.default || 'https://www.paypal.com/ncp/payment/TH74PFXUPCR2N';
    const paypalPlaceholder = !paypalLink || String(paypalLink).includes('REPLACE_WITH');

    document.body.innerHTML = HiddenGemsApp.shellHeader() + `
      <main class="mx-auto flex min-h-[75vh] max-w-5xl items-center px-6 py-16">
        <div class="w-full rounded-[2rem] border border-pink-400/20 bg-gradient-to-br from-pink-500/10 via-fuchsia-500/10 to-transparent p-8 shadow-xl shadow-black/20">
          <div class="flex items-center gap-4">
            <img src="./assets/hidden-gems-logo.png" alt="${brand} logo" class="h-14 w-14 rounded-2xl object-contain" />
            <div>
              <h1 class="text-3xl font-black text-pink-400">${brand} Points Store</h1>
              <p class="text-neutral-400">Choose a live PayPal checkout option for your account wallet.</p>
            </div>
          </div>

          <p class="mt-6 max-w-2xl text-neutral-300">Choose a points package below. All wallet purchases are routed through your live PayPal checkout link in <span class="font-semibold text-white">config.js</span>.</p>

          <div class="mt-8 grid gap-5 md:grid-cols-3">
            <div class="rounded-2xl border border-white/10 bg-black/30 p-5">
              <p class="text-sm uppercase tracking-[0.25em] text-pink-300">Starter</p>
              <h2 class="mt-2 text-2xl font-black">500 Points</h2>
              <p class="mt-1 text-sm text-neutral-400">Entry bundle for smaller unlocks.</p>
              <div class="mt-5 flex flex-col gap-3">
                <a href="${paypalLink}" target="_blank" rel="noopener noreferrer" ${paypalPlaceholder ? `onclick="event.preventDefault();alert('Add your real PayPal link in config.js first.')"` : ''} class="inline-block rounded-2xl bg-pink-500 px-5 py-3 text-center font-semibold text-white transition hover:bg-pink-400">Buy with PayPal</a>
              </div>
            </div>

            <div class="rounded-2xl border border-pink-400/30 bg-gradient-to-b from-pink-500/15 to-black/30 p-5 shadow-lg shadow-pink-500/10">
              <p class="text-sm uppercase tracking-[0.25em] text-pink-300">Popular</p>
              <h2 class="mt-2 text-2xl font-black">1,500 Points</h2>
              <p class="mt-1 text-sm text-neutral-400">Best middle-tier option for regular buyers.</p>
              <div class="mt-5 flex flex-col gap-3">
                <a href="${paypalLink}" target="_blank" rel="noopener noreferrer" ${paypalPlaceholder ? `onclick="event.preventDefault();alert('Add your real PayPal link in config.js first.')"` : ''} class="inline-block rounded-2xl bg-pink-500 px-5 py-3 text-center font-semibold text-white transition hover:bg-pink-400">Buy with PayPal</a>
              </div>
            </div>

            <div class="rounded-2xl border border-white/10 bg-black/30 p-5">
              <p class="text-sm uppercase tracking-[0.25em] text-pink-300">Max</p>
              <h2 class="mt-2 text-2xl font-black">5,000 Points</h2>
              <p class="mt-1 text-sm text-neutral-400">Big bundle for heavy point usage.</p>
              <div class="mt-5 flex flex-col gap-3">
                <a href="${paypalLink}" target="_blank" rel="noopener noreferrer" ${paypalPlaceholder ? `onclick="event.preventDefault();alert('Add your real PayPal link in config.js first.')"` : ''} class="inline-block rounded-2xl bg-pink-500 px-5 py-3 text-center font-semibold text-white transition hover:bg-pink-400">Buy with PayPal</a>
              </div>
            </div>
          </div>

          <div class="mt-8 rounded-2xl border border-white/10 bg-black/30 p-5">
            <p class="font-semibold text-white">config.js keys to use</p>
            <pre class="mt-3 overflow-x-auto rounded-xl bg-black/40 p-4 text-sm text-neutral-300"><code>window.GEMS_HIDDEN_CONFIG = {
  paypalLinks: {
    default: 'https://www.paypal.com/ncp/payment/TH74PFXUPCR2N',
    points: 'https://www.paypal.com/ncp/payment/TH74PFXUPCR2N'
  }
};</code></pre>
          </div>

          <a href="index.html" class="mt-6 inline-block text-sm text-neutral-400 hover:text-white">← Back to ${brand}</a>
        </div>
      </main>` + HiddenGemsApp.shellFooter();

    HiddenGemsApp.bindCommonUi && HiddenGemsApp.bindCommonUi();
  });
</script>
</body>
</html>
