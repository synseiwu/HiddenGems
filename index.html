                ${footer.columns.map(column => `<div><h5 class="text-sm font-semibold uppercase tracking-[0.2em] text-neutral-300">${esc(column.title)}</h5><div class="mt-4 space-y-3">${column.links.map(link => `<a href="${esc(link.href)}" class="block text-sm text-neutral-400 transition hover:text-white">${esc(link.label)}</a>`).join('')}</div></div>`).join('')}
              </div>
              <div class="border-t border-white/10 px-6 py-4 text-center text-sm text-neutral-500">${esc(site.copyright)}</div>
            </footer>` : ''}
        </div>`;
    }

    render();
  </script>
</body>
</html>
