<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Checkout | Hidden Gems</title>
  <link rel="icon" href="./assets/hidden-gems-logo.png"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./config.js"></script>
  <script defer src="./assets/site.js"></script>
</head>
<body class="min-h-screen bg-black text-white" style="background:radial-gradient(circle at top right, rgba(236,72,153,0.22), transparent 30%),radial-gradient(circle at left, rgba(217,70,239,0.14), transparent 24%),#000;">
<script>
  document.addEventListener('DOMContentLoaded',()=>{
    const cfg = window.GEMS_HIDDEN_CONFIG || {};
    const brand = cfg.brandName || 'Hidden Gems';
    const paypalLink = cfg.paypalLinks?.vip || cfg.paypalLinks?.default || 'https://www.paypal.com/ncp/payment/TH74PFXUPCR2N';
    const isPlaceholder = !paypalLink || String(paypalLink).includes('REPLACE_WITH');
    document.body.innerHTML = HiddenGemsApp.shellHeader() + `
      <main class="mx-auto flex min-h-[75vh] max-w-3xl items-center px-6 py-16">
        <div class="w-full rounded-[2rem] border border-pink-400/20 bg-gradient-to-br from-pink-500/10 via-fuchsia-500/10 to-transparent p-8 shadow-xl shadow-black/20">
          <div class="flex items-center gap-4">
            <img src="./assets/hidden-gems-logo.png" alt="${brand} logo" class="h-14 w-14 rounded-2xl object-contain" />
            <div>
              <h1 class="text-3xl font-black text-pink-400">${brand} VIP</h1>
              <p class="text-neutral-400">$20 deal — was $40</p>
            </div>
          </div>
          <p class="mt-6 text-neutral-300">Use the live PayPal checkout below to activate VIP access for your account.</p>
          <div class="mt-8 rounded-2xl border border-white/10 bg-black/30 p-5">
            <p class="text-sm uppercase tracking-[0.25em] text-pink-300">${isPlaceholder ? 'Add your PayPal VIP link in config.js' : 'Secure checkout'}</p>
            <div class="mt-4 flex flex-col gap-3 sm:flex-row">
              <a href="${paypalLink}" target="_blank" rel="noopener noreferrer" ${isPlaceholder ? `onclick="event.preventDefault();alert('Add your real VIP PayPal link in config.js first.')"` : ""} class="inline-block rounded-2xl bg-pink-500 px-6 py-3 font-semibold text-white transition hover:bg-pink-400 text-center">Pay with PayPal</a>
            </div>
          </div>
          <div class="mt-8 grid gap-4 md:grid-cols-2">
            <div class="rounded-2xl bg-white/5 p-4"><p class="font-semibold">VIP-only vault</p><p class="mt-1 text-sm text-neutral-400">Special titles reserved for VIP members.</p></div>
            <div class="rounded-2xl bg-white/5 p-4"><p class="font-semibold">Download rights</p><p class="mt-1 text-sm text-neutral-400">VIP remains the only tier with downloads.</p></div>
          </div>
          <a href="index.html" class="mt-6 inline-block text-sm text-neutral-400 hover:text-white">← Back to ${brand}</a>
        </div>
      </main>` + HiddenGemsApp.shellFooter();
    HiddenGemsApp.bindCommonUi();
    HiddenGemsApp.initVipCheckoutPage && HiddenGemsApp.initVipCheckoutPage();
  })
</script>
</body>
</html>
