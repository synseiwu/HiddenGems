<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Success | Hidden Gems</title>
  <link rel="icon" href="./assets/hidden-gems-logo.png"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./config.js"></script>
  <script defer src="./assets/site.js?v=admin-video-list-v3"></script>
</head>
<body class="min-h-screen bg-black text-white" style="background:radial-gradient(circle at top right, rgba(236,72,153,0.22), transparent 30%),radial-gradient(circle at left, rgba(217,70,239,0.14), transparent 24%),#000;">
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const shell = window.HiddenGemsApp;
  const query = new URLSearchParams(window.location.search || '');
  const videoId = query.get('video') || query.get('id') || '';
  document.body.innerHTML = shell.shellHeader() + `
    <main class="mx-auto flex min-h-[75vh] max-w-3xl items-center px-6 py-16">
      <div class="w-full rounded-[2rem] border border-emerald-400/20 bg-gradient-to-br from-emerald-500/10 via-pink-500/10 to-transparent p-8 shadow-xl shadow-black/20">
        <p class="text-sm uppercase tracking-[0.25em] text-emerald-300">Payment received</p>
        <h1 class="mt-3 text-4xl font-black text-white">Finishing your video unlock</h1>
        <p id="success-copy" class="mt-4 text-neutral-300">If you reached this page after Stripe checkout, Hidden Gems will unlock your pending video on this browser.</p>
        <div id="success-status" class="mt-6 rounded-2xl border border-white/10 bg-black/30 p-5 text-sm text-neutral-300">Checking pending Stripe unlock...</div>
        <div class="mt-8 flex flex-wrap gap-4">
          <a id="success-watch-link" href="all-videos.html" class="rounded-2xl bg-pink-500 px-6 py-3 font-semibold text-white transition hover:bg-pink-400">Open videos</a>
          <a href="my-library.html" class="rounded-2xl border border-white/15 px-6 py-3 font-semibold text-white transition hover:bg-white/5">Open library</a>
          <a href="all-videos.html" class="rounded-2xl border border-white/15 px-6 py-3 font-semibold text-white transition hover:bg-white/5">Browse videos</a>
        </div>
      </div>
    </main>` + shell.shellFooter();
  shell.bindCommonUi();
  const copy = document.getElementById('success-copy');
  const status = document.getElementById('success-status');
  const watch = document.getElementById('success-watch-link');
  try {
    const result = await shell.finalizeStripeVideoCheckoutFromLocalStorage();
    if (result.status === 'idle') {
      copy.textContent = 'No pending Stripe video unlock was found in this browser.';
      status.textContent = 'Go back to the video, click Buy Access, complete Stripe checkout, then return here from the success redirect.';
      return;
    }
    copy.textContent = result.title ? `${result.title} is now unlocked in this browser.` : 'Your video is now unlocked in this browser.';
    status.innerHTML = `Stripe checkout finished.<br><span class="text-white">Access:</span> direct video unlock${result.videoId ? `<br><span class="text-white">Video ID:</span> ${result.videoId}` : ''}`;
    if (result.videoId) {
      watch.href = `video.html?id=${encodeURIComponent(result.videoId)}`;
      watch.textContent = 'Watch unlocked video';
      setTimeout(() => { window.location.href = `video.html?id=${encodeURIComponent(result.videoId)}`; }, 1800);
    }
  } catch (error) {
    copy.textContent = 'Stripe checkout may have succeeded, but Hidden Gems could not unlock the video automatically in this browser.';
    status.textContent = error && error.message ? error.message : 'Automatic local unlock failed.';
  }
});
</script>
</body>
</html>
