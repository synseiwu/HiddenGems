<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Success | Hidden Gems</title>
  <link rel="icon" href="./assets/hidden-gems-logo.png"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./config.js"></script>
  <script defer src="./assets/site.js"></script>
</head>
<body class="min-h-screen bg-black text-white" style="background:radial-gradient(circle at top right, rgba(236,72,153,0.22), transparent 30%),radial-gradient(circle at left, rgba(217,70,239,0.14), transparent 24%),#000;">
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const shell = window.HiddenGemsApp;
  const query = new URLSearchParams(window.location.search || '');
  const kind = query.get('kind') || 'payment';
  const videoId = query.get('id') || '';
  const title = kind === 'vip' ? 'VIP activation' : kind === 'video' ? 'video purchase' : 'payment';
  document.body.innerHTML = shell.shellHeader() + `
    <main class="mx-auto flex min-h-[75vh] max-w-3xl items-center px-6 py-16">
      <div class="w-full rounded-[2rem] border border-emerald-400/20 bg-gradient-to-br from-emerald-500/10 via-pink-500/10 to-transparent p-8 shadow-xl shadow-black/20">
        <p class="text-sm uppercase tracking-[0.25em] text-emerald-300">Payment received</p>
        <h1 class="mt-3 text-4xl font-black text-white">Finishing your ${title}</h1>
        <p id="success-copy" class="mt-4 text-neutral-300">We are confirming the approved PayPal order and updating your account now.</p>
        <div id="success-status" class="mt-6 rounded-2xl border border-white/10 bg-black/30 p-5 text-sm text-neutral-300">Processing approved payment...</div>
        <div class="mt-8 flex flex-wrap gap-4">
          <a href="account.html" class="rounded-2xl bg-pink-500 px-6 py-3 font-semibold text-white transition hover:bg-pink-400">Go to account</a>
          <a href="my-library.html" class="rounded-2xl border border-white/15 px-6 py-3 font-semibold text-white transition hover:bg-white/5">Open library</a>
          <a href="all-videos.html" class="rounded-2xl border border-white/15 px-6 py-3 font-semibold text-white transition hover:bg-white/5">Browse videos</a>
        </div>
      </div>
    </main>` + shell.shellFooter();
  shell.bindCommonUi();
  const copy = document.getElementById('success-copy');
  const status = document.getElementById('success-status');
  try {
    const result = await shell.finalizeCheckoutFromUrl();
    if (result.status === 'idle') {
      copy.textContent = 'No PayPal approval token was found in this URL yet.';
      status.textContent = 'Open this page from the real PayPal success redirect so Hidden Gems can capture the approved order.';
      return;
    }
    const vipGranted = !!result.vipGranted;
    const videoUnlocked = !!result.videoUnlocked;
    const purchasedTitle = result.title || '';
    if (videoUnlocked) {
      copy.textContent = purchasedTitle ? `${purchasedTitle} is now unlocked on this account.` : 'Your video purchase was captured and unlocked successfully.';
      status.innerHTML = `Order captured successfully.<br><span class="text-white">Access:</span> direct purchase unlocked${videoId ? `<br><span class="text-white">Video ID:</span> ${videoId}` : ''}`;
      if (videoId) {
        setTimeout(() => { window.location.href = `video.html?id=${encodeURIComponent(videoId)}`; }, 1800);
      }
      return;
    }
    if (vipGranted) {
      copy.textContent = 'VIP access is now active on your account.';
      status.innerHTML = 'Order captured successfully.<br><span class="text-white">Access:</span> VIP active';
      return;
    }
    copy.textContent = 'Your approved PayPal payment was captured successfully.';
    status.textContent = 'The account update finished successfully.';
  } catch (error) {
    copy.textContent = 'Your PayPal payment may have succeeded, but Hidden Gems could not finish the account update automatically yet.';
    status.textContent = error && error.message ? error.message : 'Automatic fulfillment failed.';
  }
});
</script>
</body>
</html>
