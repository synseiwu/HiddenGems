<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Success | Hidden Gems</title>
  <link rel="icon" href="./assets/hidden-gems-logo.png"/>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://netolzyxnifogojwwesq.supabase.co" crossorigin />
  <link rel="preload" as="image" href="./assets/hidden-gems-logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./config.js"></script>
  <script defer src="./assets/site.js?v=security-live-vip-1"></script>
</head>
<body class="min-h-screen bg-black text-white" style="background:radial-gradient(circle at top right, rgba(236,72,153,0.22), transparent 30%),radial-gradient(circle at left, rgba(217,70,239,0.14), transparent 24%),#000;">
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const shell = window.HiddenGemsApp;
  const query = new URLSearchParams(window.location.search || '');
  const videoId = query.get('video') || query.get('id') || '';
  document.body.innerHTML = shell.shellHeader() + `
    <main class="mx-auto flex min-h-[75vh] max-w-3xl items-center px-6 py-16">
      <div class="w-full rounded-[2rem] border border-emerald-400/20 bg-gradient-to-br from-emerald-500/10 via-pink-500/10 to-transparent p-8 shadow-xl shadow-black/20">
        <p class="text-sm uppercase tracking-[0.25em] text-emerald-300">Payment received</p>
        <h1 class="mt-3 text-4xl font-black text-white">Verifying your access</h1>
        <p id="success-copy" class="mt-4 text-neutral-300">If you reached this page after Stripe checkout, your payment was sent to Stripe. Hidden Gems now checks for a verified access record before unlocking content.</p>
        <div id="success-status" class="mt-6 rounded-2xl border border-white/10 bg-black/30 p-5 text-sm text-neutral-300">Checking verified Stripe access...</div>
        <div class="mt-8 flex flex-wrap gap-4">
          <a id="success-watch-link" href="all-videos.html" class="rounded-2xl bg-pink-500 px-6 py-3 font-semibold text-white transition hover:bg-pink-400">Open videos</a>
          <a href="my-library.html" class="rounded-2xl border border-white/15 px-6 py-3 font-semibold text-white transition hover:bg-white/5">Open library</a>
          <a href="all-videos.html" class="rounded-2xl border border-white/15 px-6 py-3 font-semibold text-white transition hover:bg-white/5">Browse videos</a>
        </div>
      </div>
    </main>` + shell.shellFooter();
  shell.bindCommonUi();
  const copy = document.getElementById('success-copy');
  const status = document.getElementById('success-status');
  const watch = document.getElementById('success-watch-link');
  try {
    let result = await shell.finalizeStripeVideoCheckoutFromLocalStorage();
    if (result.status === 'idle' && shell.finalizeStripeVipCheckoutFromLocalStorage) {
      result = await shell.finalizeStripeVipCheckoutFromLocalStorage();
    }
    if (result.status === 'idle') {
      copy.textContent = 'No pending Stripe video or VIP unlock was found for this browser.';
      status.textContent = 'Go back to the video or VIP page, start checkout while signed in, complete Stripe checkout, then return here from the Stripe redirect.';
      return;
    }
    if (result.status === 'pending_verification') {
      copy.textContent = 'Stripe checkout finished. Access will unlock only after the verified payment record appears in Supabase.';
      status.innerHTML = `Payment pending verification.${result.videoId ? `<br><span class="text-white">Video ID:</span> ${result.videoId}` : ''}<br>Please refresh My Library after payment verification completes.`;
      watch.href = 'my-library.html';
      watch.textContent = 'Open My Library';
      return;
    }
    if (result.vipUnlocked) {
      copy.textContent = 'VIP access is now active for your account.';
      status.innerHTML = 'Stripe checkout finished.<br><span class="text-white">Access:</span> VIP membership unlocked';
      watch.href = 'vip-exclusives.html';
      watch.textContent = 'Open VIP vault';
      return;
    }
    copy.textContent = result.title ? `${result.title} is now unlocked for your account.` : 'Your video is now unlocked for your account.';
    status.innerHTML = `Verified access found.<br><span class="text-white">Access:</span> direct video unlock${result.videoId ? `<br><span class="text-white">Video ID:</span> ${result.videoId}` : ''}`;
    if (result.videoId) {
      watch.href = `video.html?id=${encodeURIComponent(result.videoId)}`;
      watch.textContent = 'Watch unlocked video';
    }
  } catch (error) {
    copy.textContent = 'Stripe checkout may have succeeded, but Hidden Gems could not verify account access automatically yet.';
    status.textContent = error && error.message ? error.message : 'Automatic account unlock failed.';
  }
});
</script>
</body>
</html>
