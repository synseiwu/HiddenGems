<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidden Gems | Account</title>
  <link rel="icon" href="./assets/hidden-gems-logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./config.js"></script>
  <script defer src="./assets/site.js"></script>
</head>
<body>
<script>
window.addEventListener('DOMContentLoaded', async ()=>{
  const app = window.HiddenGemsApp;
  if (!app) return;
  const state = await app.getState();
  const tx = app.storage.getTransactions();
  const recent = tx.length ? tx.slice(0,6).map(item => `<div class="flex items-center justify-between rounded-2xl bg-neutral-900/80 px-4 py-4"><div><p class="font-medium text-white">${item.label}</p><p class="text-sm text-neutral-400">${new Date(item.at).toLocaleString()}</p></div><p class="font-semibold ${item.amount > 0 ? 'text-emerald-300' : 'text-pink-300'}">${item.amount > 0 ? '+' : ''}${item.amount} pts</p></div>`).join('') : '<p class="text-sm text-neutral-400">No recent local activity yet.</p>';
  document.body.innerHTML = app.shellHeader() + `
    <main class="mx-auto max-w-7xl px-6 py-14">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div><p class="text-sm uppercase tracking-[0.25em] text-pink-300">Account</p><h1 class="mt-2 text-5xl font-black text-white">Your Hidden Gems account</h1></div>
        <a href="index.html" class="rounded-2xl border border-white/15 px-5 py-3 font-semibold text-white transition hover:bg-white/5">Back to Home</a>
      </div>
      ${!state.email ? `<div class="mt-8 rounded-[2rem] border border-rose-400/20 bg-rose-500/10 p-8"><h2 class="text-3xl font-black text-white">You are signed out</h2><p class="mt-3 text-neutral-300">Log in to view your account and library.</p><div class="mt-6 flex gap-4"><a href="login.html" class="rounded-2xl bg-pink-500 px-6 py-3 font-semibold text-white">Log In</a><a href="signup.html" class="rounded-2xl border border-white/15 px-6 py-3 font-semibold text-white">Create Account</a></div></div>` : `
      <div class="mt-8 grid gap-6 lg:grid-cols-[0.95fr_1.05fr]">
        <section class="rounded-[2rem] border border-white/10 bg-white/5 p-7 shadow-xl shadow-black/20">
          <div class="flex items-center gap-4"><div class="flex h-16 w-16 items-center justify-center rounded-full bg-pink-500/20 text-xl font-bold text-pink-300">${app.initialsFromEmail(state.email)}</div><div><h2 class="text-2xl font-bold text-white">Profile</h2><p class="text-sm text-neutral-400">Signed-in user details</p></div></div>
          <div class="mt-8 space-y-4">
            <div class="rounded-2xl bg-neutral-900/80 px-4 py-4"><p class="text-xs uppercase tracking-[0.2em] text-neutral-500">Email</p><p class="mt-2 break-all text-lg font-semibold text-white">${state.email}</p></div>
            <div class="rounded-2xl bg-neutral-900/80 px-4 py-4"><p class="text-xs uppercase tracking-[0.2em] text-neutral-500">Access Role</p><p class="mt-2 text-lg font-semibold text-white">${state.role.charAt(0).toUpperCase()+state.role.slice(1)}</p>${state.role === 'admin' ? '<div class="mt-4"><a href="admin.html" class="inline-flex rounded-xl bg-amber-500/20 px-4 py-2 text-sm font-semibold text-amber-100 transition hover:bg-amber-500/30">Open Admin Portal</a></div>' : ''}</div>
            <div class="rounded-2xl bg-neutral-900/80 px-4 py-4"><p class="text-xs uppercase tracking-[0.2em] text-neutral-500">Profile Points Balance</p><p class="mt-2 text-lg font-semibold text-white">${state.profile?.points_balance ?? 0}</p></div>
          </div>
        </section>
        <section class="rounded-[2rem] border border-white/10 bg-white/5 p-7 shadow-xl shadow-black/20">
          <div class="flex items-center justify-between gap-4"><div><h2 class="text-2xl font-bold text-white">Library Snapshot</h2><p class="text-sm text-neutral-400">Local unlocks and wallet activity</p></div><a href="my-library.html" class="rounded-xl border border-white/15 px-4 py-2 text-sm text-white transition hover:bg-white/5">Open Library</a></div>
          <div class="mt-8 grid gap-4 md:grid-cols-2"><div class="rounded-2xl bg-neutral-900/80 px-4 py-4"><p class="text-xs uppercase tracking-[0.2em] text-neutral-500">Unlocked Titles</p><p class="mt-2 text-lg font-semibold text-white">${state.unlocked.length}</p></div><div class="rounded-2xl bg-neutral-900/80 px-4 py-4"><p class="text-xs uppercase tracking-[0.2em] text-neutral-500">Demo Wallet</p><p class="mt-2 text-lg font-semibold text-white">${state.localPoints}</p></div></div>
          <div class="mt-6"><p class="text-xs uppercase tracking-[0.2em] text-neutral-500">Recent Activity</p><div class="mt-3 space-y-3">${recent}</div></div>
        </section>
      </div>`}
    </main>` + app.shellFooter();
  app.bindCommonUi();
});
</script>
</body>
</html>
